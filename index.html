<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIM 房间属性云端查询系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #0067FF; --bg-color: #F4F7F9; --sidebar-bg: #1A1C1E; --text-main: #1D1D1F; --text-sub: #86868B; --border-color: #E5E5E7; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 25px 15px; display: flex; flex-direction: column; flex-shrink: 0; box-sizing: border-box;}
        .sidebar h2 { font-size: 18px; margin: 0 0 20px 0; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        .status-bar { font-size: 12px; padding: 10px; background: #25282B; border-radius: 8px; margin-bottom: 20px; color: #FFD700; }
        .sheet-label { font-size: 11px; color: #555; margin-bottom: 10px; text-transform: uppercase; }
        .sheet-container { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
        .sheet-btn { width: 100%; padding: 10px 15px; background: #2c2c2e; border: none; color: #ccc; text-align: left; margin-bottom: 5px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .sheet-btn.active { background: var(--primary-color); color: white; font-weight: 600; }
        .main-layout { flex-grow: 1; display: flex; flex-direction: column; }
        .top-section { padding: 20px 40px; background: white; border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 300px; gap: 30px; }
        .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .data-item { background: #f8f9fb; padding: 8px 12px; border-radius: 6px; border: 1px solid #f0f0f2; }
        .data-label { font-size: 10px; color: var(--text-sub); display: block; margin-bottom: 2px; }
        .data-value { font-size: 12px; font-weight: 600; color: var(--text-main); white-space: pre-line; }
        .search-box input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--primary-color); font-size: 14px; outline: none; box-sizing: border-box; }
        .table-section { flex-grow: 1; padding: 0 40px 20px 40px; overflow-y: auto; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { position: sticky; top: 0; background: #fff; text-align: left; padding: 12px; font-size: 11px; color: var(--text-sub); z-index: 10; border-bottom: 2px solid var(--border-color); }
        td { padding: 10px 12px; font-size: 12px; border-bottom: 1px solid #f0f0f2; cursor: pointer; }
        tr.selected td { background-color: #e8f3ff; font-weight: 600; color: var(--primary-color); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>BIM 数据中心</h2>
    <div id="loadStatus" class="status-bar">🔄 正在连接云端...</div>
    <div class="sheet-label">楼栋列表</div>
    <div id="sheetTabs" class="sheet-container"></div>
</div>

<div class="main-layout">
    <div class="top-section">
        <div class="detail-header">
            <h1 id="res_name" style="margin:0 0 10px 0; font-size:22px;">请选择房间</h1>
            <div class="info-grid">
                <div class="data-item"><span class="data-label">楼号</span><span id="res_build" class="data-value">-</span></div>
                <div class="data-item"><span class="data-label">楼层</span><span id="res_floor" class="data-value">-</span></div>
                <div class="data-item"><span class="data-label">房间号</span><span id="res_no" class="data-value">-</span></div>
                <div class="data-item"><span class="data-label">面积(M2)</span><span id="res_area" class="data-value">-</span></div>
                <div class="data-item"><span class="data-label">地面做法</span><span id="res_floor_finish" class="data-value">-</span></div>
                <div class="data-item"><span class="data-label">墙面做法</span><span id="res_wall_finish" class="data-value">-</span></div>
                <div class="data-item"><span class="data-label">踢脚做法</span><span id="res_skirting" class="data-value">-</span></div>
                <div class="data-item"><span class="data-label">吊顶做法</span><span id="res_ceiling" class="data-value">-</span></div>
                <div class="data-item"><span class="data-label">吊顶高度</span><span id="res_height" class="data-value">-</span></div>
            </div>
        </div>
        <div class="search-box">
            <p style="font-size: 13px; font-weight:600; color:var(--primary-color); margin:0 0 8px 0;">🔍 房间号搜索:</p>
            <input type="text" id="searchInput" placeholder="快速定位..." oninput="handleSearch()">
        </div>
    </div>
    <div class="table-section">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>楼号</th><th>楼层</th><th>房间号</th><th>房间名称</th><th>面积</th><th>地面</th><th>墙面</th><th>踢脚</th><th>吊顶</th><th>高度</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 自动修正后的 GitHub Raw 链接
    const EXCEL_URL = 'https://raw.githubusercontent.com/zhuangw2/my-bim-tool/main/Room_data.xlsx';

    let allWorkbookData = {}; 
    let currentSheetName = "";

    window.onload = () => {
        loadCloudData();
    };

    function loadCloudData() {
        fetch(EXCEL_URL)
            .then(res => {
                if(!res.ok) throw new Error("无法读取文件");
                return res.arrayBuffer();
            })
            .then(buffer => {
                const workbook = XLSX.read(new Uint8Array(buffer), {type: 'array'});
                allWorkbookData = {};
                workbook.SheetNames.forEach(name => {
                    const sheet = workbook.Sheets[name];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    // 模糊匹配表头（兼容换行符）
                    let headerIdx = rows.findIndex(r => r.some(c => String(c).includes('房间号') || String(c).includes('Room-number')));
                    if (headerIdx !== -1) {
                        allWorkbookData[name] = XLSX.utils.sheet_to_json(sheet, { range: headerIdx });
                    }
                });
                document.getElementById('loadStatus').innerText = "✅ 数据同步成功";
                document.getElementById('loadStatus').style.color = "#00FF00";
                renderSheetTabs();
                const first = Object.keys(allWorkbookData).find(k => !k.includes('Notes'));
                if(first) switchSheet(first);
            })
            .catch(err => {
                document.getElementById('loadStatus').innerText = "❌ 加载失败，请检查链接";
                document.getElementById('loadStatus').style.color = "#FF3B30";
            });
    }

    // 自动适配复杂的表头名（处理换行和空格）
    function getVal(item, keys) {
        for (let k of keys) {
            // 查找包含关键字的列，且忽略空格和换行
            let realKey = Object.keys(item).find(key => key.replace(/[\r\n\s]/g, '').includes(k));
            if (realKey) return item[realKey];
        }
        return "-";
    }

    function switchSheet(name) {
        currentSheetName = name;
        document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('tab-' + name)) document.getElementById('tab-' + name).classList.add('active');
        renderTable(allWorkbookData[name] || []);
    }

    function renderSheetTabs() {
        const container = document.getElementById('sheetTabs');
        container.innerHTML = '';
        Object.keys(allWorkbookData).forEach(name => {
            if (name.includes('Notes')) return;
            const btn = document.createElement('button');
            btn.className = 'sheet-btn'; btn.innerText = "🏢 " + name; btn.id = 'tab-' + name;
            btn.onclick = () => switchSheet(name);
            container.appendChild(btn);
        });
    }

    function updateDetailPanel(item) {
        document.getElementById('res_name').innerText = getVal(item, ['ROOMNAME', '房间名称']);
        document.getElementById('res_build').innerText = getVal(item, ['BUILDINNO', '楼号']) || currentSheetName;
        document.getElementById('res_no').innerText = getVal(item, ['Room-number', '房间号']);
        document.getElementById('res_floor').innerText = getVal(item, ['BUILDINGFLOOR', '楼层']);
        document.getElementById('res_area').innerText = getVal(item, ['NETAREA', '净面积']) + " M2";
        document.getElementById('res_floor_finish').innerText = getVal(item, ['FLOOR', '地面做法']);
        document.getElementById('res_wall_finish').innerText = getVal(item, ['WALL', '墙面做法']);
        document.getElementById('res_skirting').innerText = getVal(item, ['SKIRTING', '踢脚']);
        document.getElementById('res_ceiling').innerText = getVal(item, ['CEILING', '吊顶做法']);
        document.getElementById('res_height').innerText = getVal(item, ['CEILINGHEIGHT', '吊顶高度']);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach(item => {
            const no = getVal(item, ['Room-number', '房间号']);
            if (no === "-") return;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${getVal(item, ['BUILDINNO', '楼号']) || currentSheetName}</td><td>${getVal(item, ['BUILDINGFLOOR', '楼层'])}</td><td style="font-weight:600">${no}</td><td>${getVal(item, ['ROOMNAME', '房间名称'])}</td><td>${getVal(item, ['NETAREA', '净面积'])}</td><td>${getVal(item, ['FLOOR', '地面做法'])}</td><td>${getVal(item, ['WALL', '墙面做法'])}</td><td>${getVal(item, ['SKIRTING', '踢脚'])}</td><td>${getVal(item, ['CEILING', '吊顶做法'])}</td><td>${getVal(item, ['CEILINGHEIGHT', '吊顶高度'])}</td>`;
            tr.onclick = () => {
                document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
                tr.classList.add('selected');
                updateDetailPanel(item);
            };
            tbody.appendChild(tr);
        });
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value.trim().toLowerCase();
        const data = allWorkbookData[currentSheetName] || [];
        const filtered = data.filter(i => String(getVal(i, ['Room-number', '房间号'])).toLowerCase().includes(val));
        renderTable(filtered);
        if (filtered.length > 0 && val !== "") {
            updateDetailPanel(filtered[0]);
            if(document.querySelector('#tableBody tr')) document.querySelector('#tableBody tr').classList.add('selected');
        }
    }
</script>
</body>
</html>
