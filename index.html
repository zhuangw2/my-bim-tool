<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIM 房间属性管理系统 - 精确版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #0067FF; --bg-color: #F4F7F9; --sidebar-bg: #1A1C1E; --text-main: #1D1D1F; --text-sub: #86868B; --border-color: #E5E5E7; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 25px 15px; display: flex; flex-direction: column; flex-shrink: 0; box-sizing: border-box;}
        .sidebar h2 { font-size: 18px; margin: 0 0 20px 0; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        .status-bar { font-size: 12px; padding: 10px; background: #25282B; border-radius: 8px; margin-bottom: 20px; color: #FFD700; }
        .sheet-container { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
        .sheet-btn { width: 100%; padding: 10px 15px; background: #2c2c2e; border: none; color: #ccc; text-align: left; margin-bottom: 5px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .sheet-btn.active { background: var(--primary-color); color: white; font-weight: 600; }
        .main-layout { flex-grow: 1; display: flex; flex-direction: column; }
        .top-section { padding: 20px 40px; background: white; border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        #captureArea { background: white; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .detail-header h1 { margin: 0 0 15px 0; font-size: 24px; color: var(--text-main); }
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .data-item { background: #f8f9fb; padding: 8px 12px; border-radius: 6px; border: 1px solid #f0f0f2; }
        .data-label { font-size: 10px; color: var(--text-sub); display: block; margin-bottom: 2px; }
        .data-value { font-size: 12px; font-weight: 600; color: var(--text-main); white-space: pre-line; }
        .control-panel { display: flex; flex-direction: column; gap: 10px; }
        .search-box input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--primary-color); font-size: 14px; outline: none; box-sizing: border-box; }
        .export-btn { background: #34c759; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .table-section { flex-grow: 1; padding: 0 40px 20px 40px; overflow-y: auto; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { position: sticky; top: 0; background: #fff; text-align: left; padding: 12px; font-size: 11px; color: var(--text-sub); z-index: 10; border-bottom: 2px solid var(--border-color); }
        td { padding: 10px 12px; font-size: 12px; border-bottom: 1px solid #f0f0f2; cursor: pointer; }
        tr.selected td { background-color: #e8f3ff; color: var(--primary-color); font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>BIM 数据中心</h2>
    <div id="loadStatus" class="status-bar">🔄 正在抓取云端数据...</div>
    <div class="sheet-container" id="sheetTabs"></div>
</div>

<div class="main-layout">
    <div class="top-section">
        <div id="captureArea">
            <div class="detail-header">
                <h1 id="res_name">请选择房间</h1>
                <div class="info-grid">
                    <div class="data-item"><span class="data-label">楼号</span><span id="res_build" class="data-value">-</span></div>
                    <div class="data-item"><span class="data-label">楼层</span><span id="res_floor" class="data-value">-</span></div>
                    <div class="data-item"><span class="data-label">房间号</span><span id="res_no" class="data-value">-</span></div>
                    <div class="data-item"><span class="data-label">净面积(M2)</span><span id="res_area" class="data-value">-</span></div>
                    <div class="data-item"><span class="data-label">地面做法</span><span id="res_floor_finish" class="data-value">-</span></div>
                    <div class="data-item"><span class="data-label">墙面做法</span><span id="res_wall_finish" class="data-value">-</span></div>
                    <div class="data-item"><span class="data-label">踢脚做法</span><span id="res_skirting" class="data-value">-</span></div>
                    <div class="data-item"><span class="data-label">吊顶做法</span><span id="res_ceiling" class="data-value">-</span></div>
                    <div class="data-item"><span class="data-label">吊顶高度</span><span id="res_height" class="data-value">-</span></div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div class="search-box">
                <p style="font-size: 13px; font-weight:600; color:var(--primary-color); margin:0 0 8px 0;">🔍 搜索房间号:</p>
                <input type="text" id="searchInput" placeholder="输入编号定位..." oninput="handleSearch()">
            </div>
            <button class="export-btn" onclick="exportToImage()">📸 导出做法卡片</button>
        </div>
    </div>

    <div class="table-section">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>楼层</th><th>房间号</th><th>名称</th><th>面积(M2)</th><th>地面做法</th><th>墙面做法</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const EXCEL_URL = 'https://raw.githubusercontent.com/zhuangw2/my-bim-tool/main/Room_data.xlsx';
    let allWorkbookData = {}; 
    let currentSheetName = "";

    window.onload = () => { loadCloudData(); };

    function loadCloudData() {
        fetch(EXCEL_URL).then(res => res.arrayBuffer()).then(buffer => {
            const workbook = XLSX.read(new Uint8Array(buffer), {type: 'array'});
            allWorkbookData = {};
            workbook.SheetNames.forEach(name => {
                const sheet = workbook.Sheets[name];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                let headerIdx = rows.findIndex(r => r.some(c => String(c).includes('房间号')));
                if (headerIdx !== -1) {
                    allWorkbookData[name] = processData(XLSX.utils.sheet_to_json(sheet, { range: headerIdx }));
                }
            });
            document.getElementById('loadStatus').innerText = "✅ 数据同步成功";
            renderSheetTabs();
            if(Object.keys(allWorkbookData)[0]) switchSheet(Object.keys(allWorkbookData)[0]);
        });
    }

    // 【核心改进】：不再合并 101 和 101a，仅合并完全一致的行
    function processData(data) {
        let result = [];
        let map = new Map();

        data.forEach(item => {
            let no = String(item['房间号'] || item['Room-number'] || '').trim();
            let name = String(item['房间名称'] || item['ROOM NAME'] || '');
            let floor = String(item['楼层'] || item['BUILDING FLOOR'] || '');
            
            // 过滤汇总行
            if (!no || name.includes('合计') || name.includes('总建筑面积')) return;

            // 唯一识别特征：楼层+房间号+名字
            let uniqueKey = `${floor}-${no}-${name}`;

            if (map.has(uniqueKey)) {
                let existing = map.get(uniqueKey);
                existing._area += parseFloat(item['净面积(M2)'] || item['NET AREA'] || 0) || 0;
            } else {
                let newItem = { ...item, _area: parseFloat(item['净面积(M2)'] || item['NET AREA'] || 0) || 0 };
                map.set(uniqueKey, newItem);
                result.push(newItem);
            }
        });
        return result;
    }

    function switchSheet(name) {
        currentSheetName = name;
        document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('tab-' + name)) document.getElementById('tab-' + name).classList.add('active');
        renderTable(allWorkbookData[name] || []);
    }

    function renderSheetTabs() {
        const container = document.getElementById('sheetTabs');
        container.innerHTML = '';
        Object.keys(allWorkbookData).forEach(name => {
            if(name.includes('Note')) return;
            const btn = document.createElement('button');
            btn.className = 'sheet-btn'; btn.innerText = "🏢栋 " + name; btn.id = 'tab-' + name;
            btn.onclick = () => switchSheet(name);
            container.appendChild(btn);
        });
    }

    function updateDetailPanel(item) {
        document.getElementById('res_name').innerText = (item['房间名称'] || item['ROOM NAME'] || '-').trim();
        document.getElementById('res_build').innerText = item['楼号'] || currentSheetName;
        document.getElementById('res_no').innerText = item['房间号'] || item['Room-number'] || '-';
        document.getElementById('res_floor').innerText = item['楼层'] || item['BUILDING FLOOR'] || '-';
        document.getElementById('res_area').innerText = item._area.toFixed(2) + " M2";
        document.getElementById('res_floor_finish').innerText = item['地面做法'] || item['FLOOR'] || '-';
        document.getElementById('res_wall_finish').innerText = item['墙面做法 '] || item['WALL'] || '-';
        document.getElementById('res_skirting').innerText = item['踢脚作法'] || item['SKIRTING FINISH'] || '-';
        document.getElementById('res_ceiling').innerText = item['吊顶做法'] || item['CEILING'] || '-';
        document.getElementById('res_height').innerText = item['吊顶高度'] || item['CEILING HEIGHT'] || '-';
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item['楼层'] || item['BUILDING FLOOR'] || '-'}</td>
                <td style="font-weight:600">${item['房间号'] || item['Room-number']}</td>
                <td>${item['房间名称'] || item['ROOM NAME']}</td>
                <td>${item._area.toFixed(2)}</td>
                <td>${item['地面做法'] || '-'}</td>
                <td>${item['墙面做法 '] || '-'}</td>
            `;
            tr.onclick = () => {
                document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
                tr.classList.add('selected');
                updateDetailPanel(item);
            };
            tbody.appendChild(tr);
        });
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value.trim().toLowerCase();
        const filtered = allWorkbookData[currentSheetName].filter(i => 
            String(i['房间号'] || i['Room-number']).toLowerCase().includes(val)
        );
        renderTable(filtered);
        if (filtered.length > 0 && val !== "") updateDetailPanel(filtered[0]);
    }

    function exportToImage() {
        const area = document.getElementById('captureArea');
        const roomNo = document.getElementById('res_no').innerText;
        if(roomNo === "-") return alert("请先选择房间");
        html2canvas(area, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `做法卡片_${roomNo}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
